<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KYH Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #f8f6f2;
      --bg-card: #ffffff;
      --bg-modal: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-muted: #a0a0a0;
      --accent: #2d5a27;
      --accent-light: #e8f0e6;
      --accent-hover: #3d7a35;
      --border: #e8e4df;
      --sunday: #c0392b;
      --saturday: #2874a6;
      --today-bg: #2d5a27;
      --today-text: #ffffff;
      --memo-dot: #2d5a27;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.15);
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 40px 20px 10px;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .header .subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 1px;
      font-weight: 300;
    }

    /* ── Status indicator ── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ccc;
      transition: background var(--transition);
    }

    .status-dot.connected { background: #27ae60; }
    .status-dot.disconnected { background: #e74c3c; }
    .status-dot.loading { background: #f39c12; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Navigation ── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 16px 20px 20px;
    }

    .nav-btn {
      width: 40px;
      height: 40px;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      color: var(--text-primary);
      font-size: 1rem;
    }

    .nav-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: scale(1.08);
    }

    .nav-title {
      font-size: 1.4rem;
      font-weight: 600;
      min-width: 180px;
      text-align: center;
      cursor: pointer;
      transition: color var(--transition);
    }

    .nav-title:hover { color: var(--accent); }

    .today-btn {
      position: absolute;
      right: 20px;
      font-size: 0.78rem;
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all var(--transition);
    }

    .today-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .nav-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 700px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Calendar Grid ── */
    .calendar-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 16px 30px;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px;
    }

    .weekday {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 8px 0;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    .weekday:first-child { color: var(--sunday); }
    .weekday:last-child { color: var(--saturday); }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      background: transparent;
      border: 1.5px solid transparent;
    }

    .day:hover {
      background: var(--bg-card);
      border-color: var(--border);
      box-shadow: var(--shadow-sm);
      transform: translateY(-1px);
    }

    .day.empty {
      cursor: default;
      pointer-events: none;
    }

    .day .date-num {
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1;
    }

    .day.sunday .date-num { color: var(--sunday); }
    .day.saturday .date-num { color: var(--saturday); }

    .day.today .date-num {
      background: var(--today-bg);
      color: var(--today-text);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    .day.other-month .date-num {
      color: var(--text-muted);
      opacity: 0.4;
    }

    /* Memo indicators */
    .memo-dots {
      display: flex;
      gap: 3px;
      margin-top: 4px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 90%;
    }

    .memo-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--memo-dot);
      opacity: 0.7;
    }

    .memo-preview {
      font-size: 0.55rem;
      color: var(--text-secondary);
      margin-top: 2px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 90%;
      line-height: 1.2;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 20px;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--bg-modal);
      border-radius: 16px;
      width: 100%;
      max-width: 460px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      transform: translateY(20px) scale(0.97);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h2 {
      font-size: 1.15rem;
      font-weight: 600;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 1.2rem;
      transition: all var(--transition);
    }

    .modal-close:hover {
      background: #f0f0f0;
      color: var(--text-primary);
    }

    .modal-body {
      padding: 20px 24px;
    }

    .memo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .memo-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      background: var(--bg-primary);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: all var(--transition);
    }

    .memo-item:hover {
      border-color: var(--accent);
    }

    .memo-item .memo-text {
      flex: 1;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .memo-item .memo-time {
      font-size: 0.7rem;
      color: var(--text-muted);
      white-space: nowrap;
      margin-top: 2px;
    }

    .memo-delete-btn {
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 2px 4px;
      border-radius: 4px;
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .memo-delete-btn:hover {
      color: #e74c3c;
      background: #fde8e8;
    }

    .memo-input-area {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .memo-input-area textarea {
      flex: 1;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.9rem;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      transition: border-color var(--transition);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
    }

    .memo-input-area textarea:focus {
      border-color: var(--accent);
    }

    .memo-input-area textarea::placeholder {
      color: var(--text-muted);
    }

    .memo-add-btn {
      padding: 10px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      min-height: 44px;
    }

    .memo-add-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .memo-add-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .empty-state {
      text-align: center;
      padding: 20px 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .empty-state .icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    /* ── Loading ── */
    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text-primary);
      color: #fff;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 0.85rem;
      z-index: 200;
      opacity: 0;
      transition: all 0.35s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .header { padding: 24px 16px 6px; }
      .header h1 { font-size: 1.5rem; }
      .nav { gap: 12px; padding: 12px 16px 14px; }
      .nav-title { font-size: 1.15rem; min-width: 140px; }
      .today-btn { right: 10px; font-size: 0.7rem; padding: 5px 10px; }
      .day .date-num { font-size: 0.78rem; }
      .day { padding-top: 6px; }
      .day.today .date-num { width: 24px; height: 24px; }
      .memo-preview { font-size: 0.5rem; }
      .memo-dot { width: 4px; height: 4px; }
      .modal { border-radius: 14px; margin: 10px; }
      .modal-header { padding: 18px 18px 12px; }
      .modal-body { padding: 16px 18px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>KYH Calendar</h1>
    <p class="subtitle">PERSONAL MEMO CALENDAR</p>
  </div>

  <div class="status-bar">
    <span class="status-dot loading" id="statusDot"></span>
    <span id="statusText">연결 중...</span>
  </div>

  <div class="nav-wrapper">
    <div class="nav">
      <button class="nav-btn" id="prevBtn">◀</button>
      <span class="nav-title" id="navTitle"></span>
      <button class="nav-btn" id="nextBtn">▶</button>
    </div>
    <button class="today-btn" id="todayBtn">오늘</button>
  </div>

  <div class="calendar-container">
    <div class="weekdays">
      <div class="weekday">일</div>
      <div class="weekday">월</div>
      <div class="weekday">화</div>
      <div class="weekday">수</div>
      <div class="weekday">목</div>
      <div class="weekday">금</div>
      <div class="weekday">토</div>
    </div>
    <div class="days" id="daysGrid"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <ul class="memo-list" id="memoList"></ul>
        <div class="memo-input-area">
          <textarea id="memoInput" placeholder="메모를 입력하세요..." rows="1"></textarea>
          <button class="memo-add-btn" id="memoAddBtn">추가</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- ★★★ Firebase SDK ★★★ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <script>
    // ╔══════════════════════════════════════════════════════════╗
    // ║  ★★★  아래 firebaseConfig를 본인의 Firebase 설정으로    ║
    // ║       교체하세요! (설정 방법은 README 참고)              ║
    // ╚══════════════════════════════════════════════════════════╝
   const firebaseConfig = {
  apiKey: "AIzaSyA1YO9eS9g-O43Z-zgvtyajgSt9pFUIvHE",
  authDomain: "keemyoonho-calender.firebaseapp.com",
  databaseURL: "https://keemyoonho-calender-default-rtdb.firebaseio.com",
  projectId: "keemyoonho-calender",
  storageBucket: "keemyoonho-calender.firebasestorage.app",
  messagingSenderId: "375920725462",
  appId: "1:375920725462:web:14226256300504b8d86877",
};

    // Firebase 초기화
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ── 상태 ──
    let currentYear, currentMonth;
    let memos = {}; // { "2026-04-18": [ {id, text, createdAt}, ... ], ... }
    let selectedDate = null;

    const today = new Date();
    currentYear = today.getFullYear();
    currentMonth = today.getMonth();

    // ── DOM ──
    const $grid = document.getElementById('daysGrid');
    const $title = document.getElementById('navTitle');
    const $overlay = document.getElementById('modalOverlay');
    const $modalTitle = document.getElementById('modalTitle');
    const $memoList = document.getElementById('memoList');
    const $memoInput = document.getElementById('memoInput');
    const $memoAddBtn = document.getElementById('memoAddBtn');
    const $statusDot = document.getElementById('statusDot');
    const $statusText = document.getElementById('statusText');
    const $toast = document.getElementById('toast');

    // ── Firebase 연결 상태 감지 ──
    firebase.database().ref('.info/connected').on('value', (snap) => {
      if (snap.val() === true) {
        $statusDot.className = 'status-dot connected';
        $statusText.textContent = '동기화 완료';
      } else {
        $statusDot.className = 'status-dot disconnected';
        $statusText.textContent = '오프라인';
      }
    });

    // ── Firebase에서 메모 실시간 수신 ──
    db.ref('memos').on('value', (snapshot) => {
      memos = snapshot.val() || {};
      renderCalendar();
      // 모달이 열려 있으면 모달 내용도 업데이트
      if (selectedDate) {
        renderMemoList(selectedDate);
      }
    }, (error) => {
      console.error('Firebase 읽기 오류:', error);
      showToast('데이터를 불러오지 못했습니다');
    });

    // ── 메모 추가 ──
    function addMemo(dateKey, text) {
      const newRef = db.ref(`memos/${dateKey}`).push();
      return newRef.set({
        text: text.trim(),
        createdAt: Date.now()
      });
    }

    // ── 메모 삭제 ──
    function deleteMemo(dateKey, memoId) {
      return db.ref(`memos/${dateKey}/${memoId}`).remove().then(() => {
        // 해당 날짜에 메모가 없으면 날짜 키도 제거
        return db.ref(`memos/${dateKey}`).once('value').then(snap => {
          if (!snap.exists()) {
            return db.ref(`memos/${dateKey}`).remove();
          }
        });
      });
    }

    // ── 날짜 키 생성 ──
    function dateKey(y, m, d) {
      return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    }

    // ── 캘린더 렌더링 ──
    function renderCalendar() {
      const year = currentYear;
      const month = currentMonth;

      $title.textContent = `${year}년 ${month + 1}월`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();

      let html = '';

      // 이전 달 빈 칸
      for (let i = firstDay - 1; i >= 0; i--) {
        const d = daysInPrevMonth - i;
        html += `<div class="day empty other-month"><span class="date-num">${d}</span></div>`;
      }

      // 이번 달
      const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

      for (let d = 1; d <= daysInMonth; d++) {
        const dow = new Date(year, month, d).getDay();
        const key = dateKey(year, month, d);
        const isToday = key === todayKey;

        let classes = 'day';
        if (dow === 0) classes += ' sunday';
        if (dow === 6) classes += ' saturday';
        if (isToday) classes += ' today';

        // 메모 인디케이터
        let dotsHtml = '';
        const dayMemos = memos[key];
        if (dayMemos) {
          const memoArr = Object.values(dayMemos);
          const count = Math.min(memoArr.length, 4);
          dotsHtml = '<div class="memo-dots">';
          for (let i = 0; i < count; i++) {
            dotsHtml += '<span class="memo-dot"></span>';
          }
          dotsHtml += '</div>';
          // 미리보기
          if (memoArr.length > 0) {
            const preview = memoArr[0].text || '';
            dotsHtml += `<span class="memo-preview">${escapeHtml(preview.slice(0, 8))}</span>`;
          }
        }

        html += `<div class="${classes}" onclick="openModal('${key}')">
          <span class="date-num">${d}</span>
          ${dotsHtml}
        </div>`;
      }

      // 다음 달 빈 칸
      const totalCells = firstDay + daysInMonth;
      const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
      for (let i = 1; i <= remaining; i++) {
        html += `<div class="day empty other-month"><span class="date-num">${i}</span></div>`;
      }

      $grid.innerHTML = html;
    }

    // ── 모달 열기 ──
    function openModal(key) {
      selectedDate = key;
      const parts = key.split('-');
      $modalTitle.textContent = `${parseInt(parts[0])}년 ${parseInt(parts[1])}월 ${parseInt(parts[2])}일`;
      renderMemoList(key);
      $memoInput.value = '';
      $overlay.classList.add('active');
      setTimeout(() => $memoInput.focus(), 300);
    }

    // ── 모달 닫기 ──
    function closeModal() {
      $overlay.classList.remove('active');
      selectedDate = null;
    }

    // ── 메모 목록 렌더링 ──
    function renderMemoList(key) {
      const dayMemos = memos[key];
      if (!dayMemos || Object.keys(dayMemos).length === 0) {
        $memoList.innerHTML = `
          <li class="empty-state">
            <div class="icon">📝</div>
            <div>아직 메모가 없습니다</div>
          </li>`;
        return;
      }

      const entries = Object.entries(dayMemos).sort((a, b) => (a[1].createdAt || 0) - (b[1].createdAt || 0));
      $memoList.innerHTML = entries.map(([id, memo]) => {
        const time = memo.createdAt ? new Date(memo.createdAt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) : '';
        return `
          <li class="memo-item">
            <div style="flex:1">
              <div class="memo-text">${escapeHtml(memo.text)}</div>
              <div class="memo-time">${time}</div>
            </div>
            <button class="memo-delete-btn" onclick="handleDelete('${key}','${id}')" title="삭제">🗑</button>
          </li>`;
      }).join('');
    }

    // ── 메모 추가 핸들러 ──
    $memoAddBtn.addEventListener('click', handleAdd);
    $memoInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleAdd();
      }
    });

    // 텍스트 영역 자동 높이
    $memoInput.addEventListener('input', () => {
      $memoInput.style.height = 'auto';
      $memoInput.style.height = Math.min($memoInput.scrollHeight, 120) + 'px';
    });

    function handleAdd() {
      const text = $memoInput.value.trim();
      if (!text || !selectedDate) return;

      $memoAddBtn.disabled = true;
      $memoAddBtn.innerHTML = '<span class="loading-spinner"></span>';

      addMemo(selectedDate, text)
        .then(() => {
          $memoInput.value = '';
          $memoInput.style.height = 'auto';
          showToast('메모가 저장되었습니다');
        })
        .catch((err) => {
          console.error(err);
          showToast('저장에 실패했습니다');
        })
        .finally(() => {
          $memoAddBtn.disabled = false;
          $memoAddBtn.textContent = '추가';
        });
    }

    function handleDelete(dateKey, memoId) {
      if (!confirm('이 메모를 삭제하시겠습니까?')) return;
      deleteMemo(dateKey, memoId)
        .then(() => showToast('메모가 삭제되었습니다'))
        .catch((err) => {
          console.error(err);
          showToast('삭제에 실패했습니다');
        });
    }

    // ── 네비게이션 ──
    document.getElementById('prevBtn').addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      renderCalendar();
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      renderCalendar();
    });

    document.getElementById('todayBtn').addEventListener('click', () => {
      currentYear = today.getFullYear();
      currentMonth = today.getMonth();
      renderCalendar();
    });

    // 모달 닫기
    document.getElementById('modalClose').addEventListener('click', closeModal);
    $overlay.addEventListener('click', (e) => {
      if (e.target === $overlay) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // ── 유틸리티 ──
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showToast(msg) {
      $toast.textContent = msg;
      $toast.classList.add('show');
      setTimeout(() => $toast.classList.remove('show'), 2500);
    }

    // 초기 렌더링
    renderCalendar();
  </script>
</body>
</html>
