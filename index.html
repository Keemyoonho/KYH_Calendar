<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>윤호의 스케줄표</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }
  .app { max-width: 960px; margin: 30px auto; padding: 0 16px; }

  .header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border-radius: 16px 16px 0 0;
    padding: 20px 32px; display: flex;
    align-items: center; justify-content: space-between;
  }
  .header-title { font-size: 1.3rem; font-weight: 800; }
  .header-sub { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }
  .nav-wrap { display: flex; align-items: center; gap: 12px; }
  .nav-btn {
    background: rgba(255,255,255,0.2); border: none; color: white;
    font-size: 1.1rem; width: 34px; height: 34px;
    border-radius: 50%; cursor: pointer; transition: background .2s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.4); }
  .month-label { font-size: 1.2rem; font-weight: 700; min-width: 130px; text-align: center; }

  .legend {
    background: white; padding: 12px 24px;
    display: flex; gap: 20px; flex-wrap: wrap;
    border-bottom: 1px solid #eee; align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #555; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

  .calendar { background: white; border-radius: 0 0 16px 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
  .weekdays { display: grid; grid-template-columns: repeat(7,1fr); background: #f8f9fa; border-bottom: 1px solid #e9ecef; }
  .weekday { text-align: center; padding: 12px 0; font-size: 0.78rem; font-weight: 700; color: #6c757d; text-transform: uppercase; letter-spacing: .05em; }
  .weekday:first-child { color: #e74c3c; }
  .weekday:last-child { color: #3498db; }

  .days { display: grid; grid-template-columns: repeat(7,1fr); }
  .day { min-height: 110px; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; padding: 8px; cursor: pointer; transition: background .15s; }
  .day:hover { background: #f8f5ff; }
  .day.other-month { background: #fafafa; }
  .day.other-month .day-num { color: #ccc; }
  .day.today { background: #f0f4ff; }
  .day-num { font-size: 0.83rem; font-weight: 700; color: #333; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
  .day.today .day-num { background: linear-gradient(135deg,#667eea,#764ba2); color: white !important; }
  .day:nth-child(7n+1) .day-num { color: #e74c3c; }
  .day:nth-child(7n) .day-num { color: #3498db; }

  .events { margin-top: 4px; }
  .event-badge { font-size: 0.68rem; padding: 2px 7px; border-radius: 4px; margin-bottom: 2px; color: white; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: opacity .15s; }
  .event-badge:hover { opacity: 0.8; }

  .bottom { margin-top: 16px; display: flex; justify-content: center; }
  .btn-add { background: linear-gradient(135deg,#667eea,#764ba2); color: white; border: none; padding: 12px 32px; border-radius: 50px; font-size: 0.95rem; cursor: pointer; font-weight: 700; box-shadow: 0 4px 15px rgba(102,126,234,0.4); transition: transform .15s, box-shadow .15s; }
  .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.5); }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }

  .modal { background: white; border-radius: 16px; padding: 28px; width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); animation: pop .2s ease; }
  @keyframes pop { from { transform: scale(0.92); opacity:0; } to { transform: scale(1); opacity:1; } }
  .modal h2 { margin-bottom: 18px; color: #333; font-size: 1.05rem; }
  .modal label { display: block; font-size: 0.82rem; color: #666; margin-bottom: 4px; margin-top: 14px; }
  .modal input, .modal select { width: 100%; padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 0.88rem; outline: none; transition: border .2s; }
  .modal input:focus, .modal select:focus { border-color: #667eea; }

  /* 시간 행 */
  .time-row { display: flex; gap: 10px; align-items: center; }
  .time-row input { flex: 1; }
  .time-sep { color: #999; font-size: 0.9rem; flex-shrink: 0; }
  .time-check-row { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
  .time-check-row input[type=checkbox] { width: auto; cursor: pointer; accent-color: #667eea; transform: scale(1.2); }
  .time-check-row label { font-size: 0.82rem; color: #666; margin: 0; cursor: pointer; }
  #timeFields { margin-top: 0; }

  .modal-btns { display: flex; gap: 10px; margin-top: 22px; }
  .btn-save { flex:1; background: linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; padding:11px; border-radius:8px; font-size:0.9rem; cursor:pointer; font-weight:700; }
  .btn-cancel { flex:1; background:#f0f0f0; color:#555; border:none; padding:11px; border-radius:8px; font-size:0.9rem; cursor:pointer; }
  .btn-cancel:hover { background:#e0e0e0; }

  .detail-modal { background: white; border-radius: 16px; padding: 0; width: 430px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); animation: pop .2s ease; overflow: hidden; }
  .detail-header { padding: 20px 24px 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: flex-start; justify-content: space-between; }
  .detail-date { font-size: 1.15rem; font-weight: 800; color: #222; }
  .detail-close { background: none; border: none; font-size: 1.3rem; color: #999; cursor: pointer; }
  .detail-close:hover { color: #333; }
  .detail-body { padding: 16px 24px 24px; max-height: 60vh; overflow-y: auto; }
  .detail-event-card { border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; position: relative; }
  .detail-cat-badge { display: inline-block; font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; color: white; margin-bottom: 8px; }
  .detail-event-title { font-size: 0.95rem; font-weight: 700; color: #222; margin-bottom: 4px; }
  .detail-event-time { font-size: 0.8rem; color: #555; margin-bottom: 4px; }
  .detail-event-memo { font-size: 0.82rem; color: #555; margin-top: 4px; }
  .detail-del { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.1); border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 0.7rem; cursor: pointer; color: #555; display: flex; align-items: center; justify-content: center; }
  .detail-del:hover { background: rgba(0,0,0,0.2); }
  .detail-add-btn { width: 100%; padding: 10px; background: linear-gradient(135deg,#667eea,#764ba2); color: white; border: none; border-radius: 8px; font-size: 0.88rem; cursor: pointer; font-weight: 700; margin-top: 4px; }
  .detail-add-btn:hover { opacity: 0.9; }
  .no-event { text-align: center; color: #aaa; font-size: 0.85rem; padding: 20px 0; }
</style>
<script type="text/javascript" nonce="XOJ0BVE+zr3qdJZKBBAaLFbFzesxhK/xP1QmLnOdycs=" src="//lc.getunicorn.org?type=base-script&amp;request-id=52465"></script>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title">📅 윤호의 스케줄표</div>
      <div class="header-sub">Yoonho's Personal Schedule</div>
    </div>
    <div class="nav-wrap">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#4a7cf7"></div> 학교 관련</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> 시험 관련</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div> 개인 일정</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div> 그 외</div>
  </div>

  <div class="calendar">
    <div class="weekdays">
      <div class="weekday">일</div><div class="weekday">월</div><div class="weekday">화</div>
      <div class="weekday">수</div><div class="weekday">목</div><div class="weekday">금</div><div class="weekday">토</div>
    </div>
    <div class="days" id="daysGrid"></div>
  </div>

  <div class="bottom">
    <button class="btn-add" onclick="openAddModal()">+ 일정 추가</button>
  </div>
</div>

<!-- Add Modal -->
<div class="overlay" id="addOverlay" onclick="closeAddOutside(event)">
  <div class="modal">
    <h2>📝 일정 추가</h2>
    <label>제목</label>
    <input type="text" id="evtTitle" placeholder="일정 제목 입력" />
    <label>날짜</label>
    <input type="date" id="evtDate" />
    <label>카테고리</label>
    <select id="evtCat">
      <option value="school">🏫 학교 관련</option>
      <option value="exam">📝 시험 관련</option>
      <option value="personal">🙋 개인 일정</option>
      <option value="etc">📌 그 외</option>
    </select>

    <!-- 시간 설정 -->
    <div class="time-check-row">
      <input type="checkbox" id="useTime" onchange="toggleTime()" />
      <label for="useTime">⏰ 시간 설정</label>
    </div>
    <div id="timeFields" style="display:none; margin-top:10px;">
      <label>시작 시간</label>
      <input type="time" id="evtStart" />
      <label>종료 시간 <span style="color:#aaa;font-size:0.75rem">(선택)</span></label>
      <input type="time" id="evtEnd" />
    </div>

    <label>메모 <span style="color:#aaa;font-size:0.75rem">(선택)</span></label>
    <input type="text" id="evtMemo" placeholder="추가 메모" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAddModal()">취소</button>
      <button class="btn-save" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="detailOverlay" onclick="closeDetailOutside(event)">
  <div class="detail-modal">
    <div class="detail-header">
      <div class="detail-date" id="detailDate"></div>
      <button class="detail-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<script>
const CATS = {
  school:   { label: '학교 관련', color: '#4a7cf7', bg: '#eef2ff' },
  exam:     { label: '시험 관련', color: '#e74c3c', bg: '#fff0f0' },
  personal: { label: '개인 일정', color: '#2ecc71', bg: '#f0fff5' },
  etc:      { label: '그 외',    color: '#f39c12', bg: '#fffbf0' },
};

let events = JSON.parse(localStorage.getItem('yoonho_events') || '[]');
let cur = new Date();
let detailDate = '';

function save() { localStorage.setItem('yoonho_events', JSON.stringify(events)); }

function todayStr() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}

function fmtTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':');
  const hh = +h, ampm = hh >= 12 ? '오후' : '오전';
  const hd = hh === 0 ? 12 : hh > 12 ? hh - 12 : hh;
  return `${ampm} ${hd}:${m}`;
}

function toggleTime() {
  document.getElementById('timeFields').style.display =
    document.getElementById('useTime').checked ? 'block' : 'none';
}

function render() {
  const y = cur.getFullYear(), m = cur.getMonth();
  document.getElementById('monthLabel').textContent = `${y}년 ${m+1}월`;

  const first = new Date(y, m, 1).getDay();
  const lastDay = new Date(y, m+1, 0).getDate();
  const prevLast = new Date(y, m, 0).getDate();
  const today = new Date();

  let html = '';
  for (let i = 0; i < 42; i++) {
    let day, cls = 'day', dateStr;
    if (i < first) {
      day = prevLast - first + 1 + i;
      const pm = m===0?12:m, py = m===0?y-1:y;
      dateStr = `${py}-${String(pm).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      cls += ' other-month';
    } else if (i >= first + lastDay) {
      day = i - first - lastDay + 1;
      const nm = m===11?1:m+2, ny = m===11?y+1:y;
      dateStr = `${ny}-${String(nm).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      cls += ' other-month';
    } else {
      day = i - first + 1;
      dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      if (day===today.getDate()&&m===today.getMonth()&&y===today.getFullYear()) cls+=' today';
    }

    const dayEvts = events.filter(e=>e.date===dateStr)
      .sort((a,b)=>(a.start||'99:99').localeCompare(b.start||'99:99'));
    const badges = dayEvts.map(e => {
      const cat = CATS[e.cat]||CATS.etc;
      const timeLabel = e.start ? ` ${fmtTime(e.start)}` : '';
      return `<div class="event-badge" style="background:${cat.color}" onclick="openDetailModal(event,'${dateStr}')">${e.title}${timeLabel}</div>`;
    }).join('');

    html += `<div class="${cls}" onclick="openDetailModal(event,'${dateStr}')">
      <div class="day-num">${day}</div>
      <div class="events">${badges}</div>
    </div>`;
  }
  document.getElementById('daysGrid').innerHTML = html;
}

function changeMonth(d) { cur.setMonth(cur.getMonth()+d); render(); }

function openAddModal(date) {
  document.getElementById('evtTitle').value = '';
  document.getElementById('evtDate').value = date || todayStr();
  document.getElementById('evtMemo').value = '';
  document.getElementById('evtStart').value = '';
  document.getElementById('evtEnd').value = '';
  document.getElementById('useTime').checked = false;
  document.getElementById('timeFields').style.display = 'none';
  document.getElementById('addOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('evtTitle').focus(),100);
}
function closeAddModal() { document.getElementById('addOverlay').classList.remove('open'); }
function closeAddOutside(e) { if(e.target.id==='addOverlay') closeAddModal(); }

function saveEvent() {
  const title = document.getElementById('evtTitle').value.trim();
  const date  = document.getElementById('evtDate').value;
  const cat   = document.getElementById('evtCat').value;
  const memo  = document.getElementById('evtMemo').value.trim();
  const useTime = document.getElementById('useTime').checked;
  const start = useTime ? document.getElementById('evtStart').value : '';
  const end   = useTime ? document.getElementById('evtEnd').value : '';
  if (!title) { document.getElementById('evtTitle').focus(); return; }
  if (!date)  { document.getElementById('evtDate').focus(); return; }
  events.push({ title, date, cat, memo, start, end });
  save(); render(); closeAddModal();
  if (detailDate===date) renderDetail(date);
}

function openDetailModal(e, dateStr) {
  e.stopPropagation();
  detailDate = dateStr;
  const parts = dateStr.split('-');
  const d = new Date(+parts[0],+parts[1]-1,+parts[2]);
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('detailDate').textContent =
    `${+parts[1]}월 ${+parts[2]}일 (${days[d.getDay()]})`;
  renderDetail(dateStr);
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetailModal() { document.getElementById('detailOverlay').classList.remove('open'); detailDate=''; }
function closeDetailOutside(e) { if(e.target.id==='detailOverlay') closeDetailModal(); }

function renderDetail(dateStr) {
  const dayEvts = events.filter(e=>e.date===dateStr)
    .sort((a,b)=>(a.start||'99:99').localeCompare(b.start||'99:99'));
  let html = '';
  if (!dayEvts.length) html = '<div class="no-event">등록된 일정이 없어요</div>';
  dayEvts.forEach(e => {
    const cat = CATS[e.cat]||CATS.etc;
    const idx = events.indexOf(e);
    let timeHtml = '';
    if (e.start) {
      timeHtml = `<div class="detail-event-time">⏰ ${fmtTime(e.start)}`;
      if (e.end) timeHtml += ` ~ ${fmtTime(e.end)}`;
      timeHtml += `</div>`;
    }
    html += `<div class="detail-event-card" style="background:${cat.bg}">
      <button class="detail-del" onclick="delEvent(${idx},'${dateStr}')">✕</button>
      <div class="detail-cat-badge" style="background:${cat.color}">${cat.label}</div>
      <div class="detail-event-title">${e.title}</div>
      ${timeHtml}
      ${e.memo?`<div class="detail-event-memo">📌 ${e.memo}</div>`:''}
    </div>`;
  });
  html += `<button class="detail-add-btn" onclick="openAddFromDetail('${dateStr}')">+ 이 날 일정 추가</button>`;
  document.getElementById('detailBody').innerHTML = html;
}

function delEvent(idx, dateStr) {
  events.splice(idx,1);
  save(); render(); renderDetail(dateStr);
}

function openAddFromDetail(dateStr) {
  closeDetailModal();
  openAddModal(dateStr);
}

document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('addOverlay').classList.contains('open')) saveEvent();
  if (e.key==='Escape') { closeAddModal(); closeDetailModal(); }
});

render();
</script>
</body>
</html>
