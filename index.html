<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>윤호의 스케줄표</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:#0f0f1a; color:#e0e0e0; min-height:100vh; }

  /* === HEADER === */
  header { background:linear-gradient(135deg,#1a1a2e,#16213e); padding:20px 30px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #2a2a4a; }
  header h1 { font-size:1.4rem; }
  header h1 span { color:#7c83ff; }
  header small { color:#888; font-size:0.8rem; }
  .sync-status { font-size:0.75rem; padding:4px 12px; border-radius:12px; }
  .sync-online { background:#1b3a1b; color:#4caf50; }
  .sync-offline { background:#3a1b1b; color:#f44336; }

  /* === LAYOUT === */
  .container { display:flex; gap:20px; padding:20px; max-width:1400px; margin:auto; flex-wrap:wrap; }
  .calendar-section { flex:2; min-width:320px; }
  .side-section { flex:1; min-width:280px; display:flex; flex-direction:column; gap:16px; }

  /* === CALENDAR === */
  .cal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .cal-header h2 { font-size:1.1rem; }
  .cal-nav { display:flex; gap:8px; }
  .cal-nav button { background:#1e1e36; border:1px solid #3a3a5c; color:#ccc; width:32px; height:32px; border-radius:6px; cursor:pointer; font-size:1rem; }
  .cal-nav button:hover { background:#2a2a4a; }
  .weekdays { display:grid; grid-template-columns:repeat(7,1fr); text-align:center; font-size:0.75rem; color:#888; margin-bottom:4px; }
  .days { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
  .day { min-height:80px; background:#1a1a2e; border-radius:6px; padding:4px 6px; cursor:pointer; border:1px solid transparent; transition:0.2s; position:relative; }
  .day:hover { border-color:#7c83ff44; }
  .day.today { border-color:#7c83ff; }
  .day.other-month { opacity:0.3; }
  .day-num { font-size:0.75rem; font-weight:500; }
  .day-num.sun { color:#ff6b6b; }
  .day-num.sat { color:#6ba4ff; }
  .day-events { margin-top:2px; }
  .day-event { font-size:0.6rem; padding:1px 4px; border-radius:3px; margin-bottom:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; }

  /* === CATEGORY COLORS === */
  .cat-school { background:#2e4a1e; color:#8bc34a; }
  .cat-exam { background:#4a3a1e; color:#ffc107; }
  .cat-personal { background:#1e3a4a; color:#29b6f6; }
  .cat-anniversary { background:#4a1e3a; color:#e91e8b; }
  .cat-other { background:#3a3a3a; color:#bbb; }

  /* === LEGEND === */
  .legend { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
  .legend-item { font-size:0.7rem; display:flex; align-items:center; gap:4px; cursor:pointer; opacity:1; transition:0.2s; }
  .legend-item.off { opacity:0.3; }
  .legend-dot { width:10px; height:10px; border-radius:50%; }

  /* === CARDS === */
  .card { background:#1a1a2e; border-radius:10px; padding:16px; border:1px solid #2a2a4a; }
  .card h3 { font-size:0.9rem; margin-bottom:10px; }

  /* === MEMO === */
  .memo-area { width:100%; background:#12121f; border:1px solid #2a2a4a; border-radius:6px; color:#e0e0e0; padding:10px; font-family:inherit; font-size:0.85rem; resize:vertical; min-height:80px; }
  .memo-area:focus { outline:none; border-color:#7c83ff; }
  .char-count { text-align:right; font-size:0.7rem; color:#666; margin-top:4px; }

  /* === TODO === */
  .todo-input-row { display:flex; gap:6px; margin-bottom:10px; }
  .todo-input-row input { flex:1; background:#12121f; border:1px solid #2a2a4a; border-radius:6px; color:#e0e0e0; padding:6px 10px; font-size:0.85rem; }
  .todo-input-row input:focus { outline:none; border-color:#7c83ff; }
  .todo-input-row button { background:#7c83ff; color:#fff; border:none; border-radius:6px; padding:6px 14px; cursor:pointer; font-size:0.8rem; }
  .todo-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid #1e1e36; font-size:0.85rem; }
  .todo-item input[type=checkbox] { accent-color:#7c83ff; }
  .todo-item.done span { text-decoration:line-through; color:#666; }
  .todo-item .del { margin-left:auto; color:#666; cursor:pointer; font-size:0.7rem; }
  .todo-item .del:hover { color:#f44; }

  /* === MODAL === */
  .modal-overlay { display:none; position:fixed; inset:0; background:#000a; z-index:100; justify-content:center; align-items:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:#1a1a2e; border-radius:12px; padding:24px; width:90%; max-width:420px; border:1px solid #2a2a4a; max-height:90vh; overflow-y:auto; }
  .modal h3 { margin-bottom:16px; font-size:1rem; }
  .form-group { margin-bottom:12px; }
  .form-group label { display:block; font-size:0.75rem; color:#aaa; margin-bottom:4px; }
  .form-group input, .form-group textarea, .form-group select {
    width:100%; background:#12121f; border:1px solid #2a2a4a; border-radius:6px; color:#e0e0e0; padding:8px 10px; font-family:inherit; font-size:0.85rem;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline:none; border-color:#7c83ff; }
  .form-group textarea { resize:vertical; min-height:60px; }
  .cat-btns { display:flex; flex-wrap:wrap; gap:6px; }
  .cat-btn { padding:6px 12px; border-radius:16px; border:1px solid #3a3a5c; background:transparent; color:#ccc; font-size:0.75rem; cursor:pointer; transition:0.2s; }
  .cat-btn.active { border-color:#7c83ff; color:#7c83ff; background:#7c83ff22; }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
  .modal-actions button { padding:8px 20px; border-radius:6px; border:none; cursor:pointer; font-size:0.85rem; }
  .btn-cancel { background:#2a2a4a; color:#ccc; }
  .btn-save { background:#7c83ff; color:#fff; }
  .btn-delete { background:#f4433622; color:#f44336; border:1px solid #f4433644 !important; }

  /* === DETAIL MODAL === */
  .detail-field { margin-bottom:8px; font-size:0.85rem; }
  .detail-label { color:#888; font-size:0.7rem; }

  /* === FOOTER === */
  footer { text-align:center; padding:16px; color:#555; font-size:0.75rem; }

  /* === TOGGLE === */
  .toggle-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .toggle-row input[type=checkbox] { accent-color:#7c83ff; }
  .toggle-row label { font-size:0.8rem; color:#aaa; }
</style>

<body>

<header>
  <div>
    <h1>📅 <span>윤호의 스케줄표</span></h1>
    <small>Yoonho's Personal Schedule — Firebase Synced</small>
  </div>
  <div id="syncStatus" class="sync-status sync-offline">⏳ 연결 중...</div>
</header>

<div class="container">
  <div class="calendar-section">
    <div class="legend" id="legend"></div>
    <div class="cal-header">
      <button class="cal-nav" style="background:none;border:none;"><button onclick="changeMonth(-1)">←</button></button>
      <h2 id="calTitle"></h2>
      <button class="cal-nav" style="background:none;border:none;"><button onclick="changeMonth(1)">→</button></button>
    </div>
    <div class="weekdays"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div>
    <div class="days" id="calGrid"></div>
    <br>
    <button onclick="openAddModal()" style="width:100%;padding:10px;background:#7c83ff22;border:1px dashed #7c83ff;color:#7c83ff;border-radius:8px;cursor:pointer;font-size:0.9rem;">+ 일정 추가</button>
  </div>

  <div class="side-section">
    <div class="card">
      <h3>⚡ 빠른 메모</h3>
      <textarea class="memo-area" id="memoArea" placeholder="메모를 입력하세요..." oninput="saveMemo()"></textarea>
      <div class="char-count"><span id="charCount">0</span>자</div>
    </div>
    <div class="card">
      <h3>✅ 할 일 목록</h3>
      <div class="todo-input-row">
        <input id="todoInput" placeholder="할 일 입력..." onkeydown="if(event.key==='Enter')addTodo()">
        <button onclick="addTodo()">추가</button>
      </div>
      <div id="todoList"></div>
    </div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3 id="modalTitle">📝 일정 추가</h3>
    <input type="hidden" id="editId">
    <div class="form-group"><label>제목</label><input id="evTitle" placeholder="일정 제목"></div>
    <div class="form-group"><label>날짜</label><input id="evDate" type="date"></div>
    <div class="form-group">
      <label>카테고리</label>
      <div class="cat-btns" id="catBtns">
        <button class="cat-btn" data-cat="school" onclick="pickCat(this)">🏫 학교 관련</button>
        <button class="cat-btn" data-cat="exam" onclick="pickCat(this)">📝 시험 관련</button>
        <button class="cat-btn" data-cat="personal" onclick="pickCat(this)">🙋 개인 일정</button>
        <button class="cat-btn" data-cat="anniversary" onclick="pickCat(this)">🎉 기념일</button>
        <button class="cat-btn" data-cat="other" onclick="pickCat(this)">📌 그 외</button>
      </div>
    </div>
    <div class="form-group">
      <div class="toggle-row"><input type="checkbox" id="toggleTime" onchange="document.getElementById('timeRow').style.display=this.checked?'block':'none'"><label for="toggleTime">⏰ 시간 설정</label></div>
      <div id="timeRow" style="display:none"><input id="evTime" type="time"></div>
    </div>
    <div class="form-group">
      <div class="toggle-row"><input type="checkbox" id="toggleDeadline" onchange="document.getElementById('deadlineRow').style.display=this.checked?'block':'none'"><label for="toggleDeadline">⚠️ 마감일 설정</label></div>
      <div id="deadlineRow" style="display:none">
        <input id="evDeadline" type="date" style="margin-bottom:6px">
        <input id="evDeadlineNote" placeholder="마감 메모 (선택)">
      </div>
    </div>
    <div class="form-group">
      <div class="toggle-row"><input type="checkbox" id="toggleLink" onchange="document.getElementById('linkRow').style.display=this.checked?'block':'none'"><label for="toggleLink">🔗 링크 추가</label></div>
      <div id="linkRow" style="display:none">
        <input id="evLink" placeholder="링크 URL" style="margin-bottom:6px">
        <input id="evLinkName" placeholder="링크 이름 (선택)">
      </div>
    </div>
    <div class="form-group"><label>메모 (선택)</label><textarea id="evMemo" placeholder="메모..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-delete" id="btnDelete" style="display:none" onclick="deleteEvent()">삭제</button>
      <button class="btn-cancel" onclick="closeAddModal()">취소</button>
      <button class="btn-save" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal" id="detailContent"></div>
</div>

<footer>@Keemyoonho</footer>

<script type="module">
  // ★★★ 여기에 본인의 firebaseConfig를 붙여넣으세요 ★★★
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyA1YO9eS9g-O43Z-zgvtyajgSt9pFUIvHE",
  authDomain: "keemyoonho-calender.firebaseapp.com",
  databaseURL: "https://keemyoonho-calender-default-rtdb.firebaseio.com",
  projectId: "keemyoonho-calender",
  storageBucket: "keemyoonho-calender.firebasestorage.app",
  messagingSenderId: "375920725462",
  appId: "1:375920725462:web:14226256300504b8d86877",
};


  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ---- Expose to global scope for inline handlers ----
  window._db = db;
  window._collection = collection;
  window._doc = doc;
  window._setDoc = setDoc;
  window._deleteDoc = deleteDoc;
  window._onSnapshot = onSnapshot;

  // ---- Real-time listeners ----
  // 1) Events
  onSnapshot(collection(db, "events"), (snap) => {
    window._events = {};
    snap.forEach(d => { window._events[d.id] = d.data(); });
    if(window.renderCal) window.renderCal();
    updateSyncStatus(true);
  }, err => { console.error(err); updateSyncStatus(false); });

  // 2) Todos
  onSnapshot(collection(db, "todos"), (snap) => {
    window._todos = [];
    snap.forEach(d => window._todos.push({id:d.id, ...d.data()}));
    window._todos.sort((a,b)=>(a.order||0)-(b.order||0));
    if(window.renderTodos) window.renderTodos();
  });

  // 3) Memo
  onSnapshot(doc(db, "meta", "memo"), (snap) => {
    if(snap.exists()) {
      const ta = document.getElementById('memoArea');
      if(document.activeElement !== ta) {
        ta.value = snap.data().text || '';
        document.getElementById('charCount').textContent = ta.value.length;
      }
    }
  });

  function updateSyncStatus(ok) {
    const el = document.getElementById('syncStatus');
    if(ok) { el.textContent='🟢 동기화 완료'; el.className='sync-status sync-online'; }
    else   { el.textContent='🔴 오프라인';     el.className='sync-status sync-offline'; }
  }
  updateSyncStatus(false);
</script>

<script>
  // ============ STATE ============
  window._events = window._events || {};
  window._todos  = window._todos  || [];
  let curYear, curMonth;
  const CATS = [
    {key:'school',      label:'🏫 학교 관련', cls:'cat-school',      color:'#8bc34a'},
    {key:'exam',        label:'📝 시험 관련', cls:'cat-exam',        color:'#ffc107'},
    {key:'personal',    label:'🙋 개인 일정', cls:'cat-personal',    color:'#29b6f6'},
    {key:'anniversary', label:'🎉 기념일',    cls:'cat-anniversary', color:'#e91e8b'},
    {key:'other',       label:'📌 그 외',     cls:'cat-other',       color:'#999'},
  ];
  let hiddenCats = new Set();
  let selectedCat = 'school';

  // ============ INIT ============
  (function init(){
    const now = new Date();
    curYear = now.getFullYear();
    curMonth = now.getMonth();
    buildLegend();
    renderCal();
  })();

  // ============ LEGEND ============
  function buildLegend(){
    const el = document.getElementById('legend');
    el.innerHTML = CATS.map(c=>`<div class="legend-item" data-cat="${c.key}" onclick="toggleCat('${c.key}')"><div class="legend-dot" style="background:${c.color}"></div>${c.label}</div>`).join('');
  }
  window.toggleCat = function(key){
    hiddenCats.has(key)?hiddenCats.delete(key):hiddenCats.add(key);
    document.querySelectorAll('.legend-item').forEach(el=>{
      el.classList.toggle('off', hiddenCats.has(el.dataset.cat));
    });
    renderCal();
  };

  // ============ CALENDAR ============
  window.renderCal = function(){
    document.getElementById('calTitle').textContent = `${curYear}년 ${curMonth+1}월`;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    const first = new Date(curYear, curMonth, 1);
    const startDay = first.getDay();
    const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
    const prevDays = new Date(curYear, curMonth, 0).getDate();
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    const cells = [];
    for(let i=startDay-1;i>=0;i--) cells.push({d:prevDays-i, other:true, month:curMonth-1});
    for(let i=1;i<=daysInMonth;i++) cells.push({d:i, other:false, month:curMonth});
    const rem = 7 - cells.length%7; if(rem<7) for(let i=1;i<=rem;i++) cells.push({d:i, other:true, month:curMonth+1});

    cells.forEach((c,idx)=>{
      const dow = idx%7;
      const realMonth = c.month;
      const realYear = curYear + (realMonth<0?-1:realMonth>11?1:0);
      const rm = ((realMonth%12)+12)%12;
      const dateStr = `${realYear}-${String(rm+1).padStart(2,'0')}-${String(c.d).padStart(2,'0')}`;
      const div = document.createElement('div');
      div.className = 'day' + (c.other?' other-month':'') + (dateStr===todayStr?' today':'');
      div.onclick = ()=>{ openAddModal(dateStr); };
      const numCls = dow===0?'day-num sun':dow===6?'day-num sat':'day-num';
      div.innerHTML = `<div class="${numCls}">${c.d}</div><div class="day-events" id="ev-${dateStr}"></div>`;
      grid.appendChild(div);

      // render events for this date
      const evDiv = div.querySelector('.day-events');
      Object.entries(window._events).forEach(([id,ev])=>{
        if(ev.date===dateStr && !hiddenCats.has(ev.category)){
          const cat = CATS.find(x=>x.key===ev.category)||CATS[4];
          const tag = document.createElement('div');
          tag.className = 'day-event '+cat.cls;
          tag.textContent = ev.title;
          tag.onclick = (e)=>{ e.stopPropagation(); showDetail(id,ev); };
          evDiv.appendChild(tag);
        }
      });
    });
  };

  window.changeMonth = function(d){ curMonth+=d; if(curMonth<0){curMonth=11;curYear--;}if(curMonth>11){curMonth=0;curYear++;} renderCal(); };

  // ============ ADD / EDIT MODAL ============
  window.openAddModal = function(dateStr){
    document.getElementById('editId').value='';
    document.getElementById('modalTitle').textContent='📝 일정 추가';
    document.getElementById('evTitle').value='';
    document.getElementById('evDate').value=dateStr||'';
    document.getElementById('evTime').value='';
    document.getElementById('evDeadline').value='';
    document.getElementById('evDeadlineNote').value='';
    document.getElementById('evLink').value='';
    document.getElementById('evLinkName').value='';
    document.getElementById('evMemo').value='';
    document.getElementById('toggleTime').checked=false;
    document.getElementById('toggleDeadline').checked=false;
    document.getElementById('toggleLink').checked=false;
    document.getElementById('timeRow').style.display='none';
    document.getElementById('deadlineRow').style.display='none';
    document.getElementById('linkRow').style.display='none';
    document.getElementById('btnDelete').style.display='none';
    pickCatByKey('school');
    document.getElementById('addModal').classList.add('show');
  };
  window.closeAddModal = function(){ document.getElementById('addModal').classList.remove('show'); };

  window.openEditModal = function(id, ev){
    openAddModal(ev.date);
    document.getElementById('editId').value=id;
    document.getElementById('modalTitle').textContent='📝 일정 수정';
    document.getElementById('evTitle').value=ev.title||'';
    document.getElementById('evMemo').value=ev.memo||'';
    document.getElementById('btnDelete').style.display='inline-block';
    pickCatByKey(ev.category||'school');
    if(ev.time){ document.getElementById('toggleTime').checked=true; document.getElementById('timeRow').style.display='block'; document.getElementById('evTime').value=ev.time; }
    if(ev.deadline){ document.getElementById('toggleDeadline').checked=true; document.getElementById('deadlineRow').style.display='block'; document.getElementById('evDeadline').value=ev.deadline; document.getElementById('evDeadlineNote').value=ev.deadlineNote||''; }
    if(ev.link){ document.getElementById('toggleLink').checked=true; document.getElementById('linkRow').style.display='block'; document.getElementById('evLink').value=ev.link; document.getElementById('evLinkName').value=ev.linkName||''; }
  };

  window.pickCat = function(btn){
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectedCat = btn.dataset.cat;
  };
  function pickCatByKey(key){
    document.querySelectorAll('.cat-btn').forEach(b=>{ b.classList.toggle('active',b.dataset.cat===key); });
    selectedCat=key;
  }

  // ============ SAVE EVENT → FIRESTORE ============
  window.saveEvent = async function(){
    const title = document.getElementById('evTitle').value.trim();
    const date = document.getElementById('evDate').value;
    if(!title||!date){ alert('제목과 날짜는 필수입니다.'); return; }
    const data = { title, date, category:selectedCat, updatedAt:Date.now() };
    if(document.getElementById('toggleTime').checked) data.time=document.getElementById('evTime').value;
    if(document.getElementById('toggleDeadline').checked){ data.deadline=document.getElementById('evDeadline').value; data.deadlineNote=document.getElementById('evDeadlineNote').value; }
    if(document.getElementById('toggleLink').checked){ data.link=document.getElementById('evLink').value; data.linkName=document.getElementById('evLinkName').value; }
    const memo=document.getElementById('evMemo').value.trim(); if(memo) data.memo=memo;
    const editId = document.getElementById('editId').value;
    const id = editId || ('ev_'+Date.now()+'_'+Math.random().toString(36).slice(2,6));
    await window._setDoc(window._doc(window._db,"events",id), data, {merge:true});
    closeAddModal();
  };

  // ============ DELETE EVENT ============
  window.deleteEvent = async function(){
    const id=document.getElementById('editId').value;
    if(!id) return;
    if(!confirm('이 일정을 삭제할까요?')) return;
    await window._deleteDoc(window._doc(window._db,"events",id));
    closeAddModal();
  };

  // ============ DETAIL MODAL ============
  window.showDetail = function(id,ev){
    const cat = CATS.find(c=>c.key===ev.category)||CATS[4];
    let h = `<h3>${cat.label} — ${ev.title}</h3>`;
    h += `<div class="detail-field"><div class="detail-label">날짜</div>${ev.date}</div>`;
    if(ev.time) h+=`<div class="detail-field"><div class="detail-label">시간</div>${ev.time}</div>`;
    if(ev.deadline) h+=`<div class="detail-field"><div class="detail-label">마감일</div>${ev.deadline} ${ev.deadlineNote?'— '+ev.deadlineNote:''}</div>`;
    if(ev.link) h+=`<div class="detail-field"><div class="detail-label">링크</div><a href="${ev.link}" target="_blank" style="color:#7c83ff">${ev.linkName||ev.link}</a></div>`;
    if(ev.memo) h+=`<div class="detail-field"><div class="detail-label">메모</div>${ev.memo}</div>`;
    h+=`<div class="modal-actions"><button class="btn-cancel" onclick="document.getElementById('detailModal').classList.remove('show')">닫기</button><button class="btn-save" onclick="document.getElementById('detailModal').classList.remove('show');openEditModal('${id}',window._events['${id}'])">수정</button></div>`;
    document.getElementById('detailContent').innerHTML=h;
    document.getElementById('detailModal').classList.add('show');
  };

  // ============ MEMO → FIRESTORE ============
  let memoTimer;
  window.saveMemo = function(){
    const ta=document.getElementById('memoArea');
    document.getElementById('charCount').textContent=ta.value.length;
    clearTimeout(memoTimer);
    memoTimer=setTimeout(async()=>{
      await window._setDoc(window._doc(window._db,"meta","memo"),{text:ta.value});
    },500);
  };

  // ============ TODO → FIRESTORE ============
  window.renderTodos = function(){
    const el=document.getElementById('todoList');
    el.innerHTML='';
    window._todos.forEach(t=>{
      const div=document.createElement('div');
      div.className='todo-item'+(t.done?' done':'');
      div.innerHTML=`<input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo('${t.id}',this.checked)"><span>${t.text}</span><span class="del" onclick="delTodo('${t.id}')">✕</span>`;
      el.appendChild(div);
    });
  };
  window.addTodo = async function(){
    const inp=document.getElementById('todoInput');
    const text=inp.value.trim(); if(!text) return;
    const id='todo_'+Date.now();
    await window._setDoc(window._doc(window._db,"todos",id),{text,done:false,order:Date.now()});
    inp.value='';
  };
  window.toggleTodo = async function(id,done){
    await window._setDoc(window._doc(window._db,"todos",id),{done},{merge:true});
  };
  window.delTodo = async function(id){
    await window._deleteDoc(window._doc(window._db,"todos",id));
  };
</script>
</body>
</html>
