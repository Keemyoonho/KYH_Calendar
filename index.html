<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Calendar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }

  .app { max-width: 900px; margin: 30px auto; padding: 0 16px; }

  /* Header */
  .header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border-radius: 16px 16px 0 0;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { font-size: 1.5rem; font-weight: 700; }
  .nav-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    font-size: 1.2rem;
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    transition: background .2s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.4); }
  .month-label { font-size: 1.3rem; font-weight: 600; min-width: 160px; text-align: center; }

  /* Calendar grid */
  .calendar {
    background: white;
    border-radius: 0 0 16px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    overflow: hidden;
  }
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: #f8f9fa;
    border-bottom: 1px solid #e9ecef;
  }
  .weekday {
    text-align: center;
    padding: 12px 0;
    font-size: 0.8rem;
    font-weight: 600;
    color: #6c757d;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .weekday:first-child { color: #e74c3c; }
  .weekday:last-child { color: #3498db; }

  .days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .day {
    min-height: 100px;
    border-right: 1px solid #f0f0f0;
    border-bottom: 1px solid #f0f0f0;
    padding: 8px;
    cursor: pointer;
    transition: background .15s;
    position: relative;
  }
  .day:hover { background: #f8f5ff; }
  .day.other-month { background: #fafafa; }
  .day.other-month .day-num { color: #ccc; }
  .day.today { background: #f0f4ff; }
  .day-num {
    font-size: 0.85rem;
    font-weight: 600;
    color: #333;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
  }
  .day.today .day-num {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
  }
  .day:nth-child(7n+1) .day-num { color: #e74c3c; }
  .day:nth-child(7n) .day-num { color: #3498db; }
  .day.today .day-num { color: white !important; }

  .events { margin-top: 4px; }
  .event-badge {
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 4px;
    margin-bottom: 2px;
    color: white;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
  }
  .event-badge:hover { opacity: 0.85; }
  .del-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    color: rgba(255,255,255,0.8);
    cursor: pointer;
    font-size: 0.75rem;
    line-height: 1;
    padding: 0;
  }
  .del-btn:hover { color: white; }

  /* Modal */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 16px;
    padding: 32px;
    width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: pop .2s ease;
  }
  @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal h2 { margin-bottom: 20px; color: #333; font-size: 1.1rem; }
  .modal label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 4px; margin-top: 14px; }
  .modal input, .modal select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 0.9rem;
    outline: none;
    transition: border .2s;
  }
  .modal input:focus, .modal select:focus { border-color: #667eea; }
  .color-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .color-opt {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: transform .15s, border .15s;
  }
  .color-opt.selected, .color-opt:hover { transform: scale(1.15); border-color: #333; }
  .modal-btns { display: flex; gap: 10px; margin-top: 24px; }
  .btn-save {
    flex: 1;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-size: 0.95rem;
    cursor: pointer;
    font-weight: 600;
  }
  .btn-cancel {
    flex: 1;
    background: #f0f0f0;
    color: #555;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-size: 0.95rem;
    cursor: pointer;
  }
  .btn-save:hover { opacity: 0.9; }
  .btn-cancel:hover { background: #e0e0e0; }

  /* Bottom bar */
  .bottom { margin-top: 16px; text-align: center; }
  .btn-add-top {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 50px;
    font-size: 0.95rem;
    cursor: pointer;
    font-weight: 600;
    box-shadow: 0 4px 15px rgba(102,126,234,0.4);
    transition: transform .15s, box-shadow .15s;
  }
  .btn-add-top:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.5); }
</style>
<script type="text/javascript" nonce="XOJ0BVE+zr3qdJZKBBAaLFbFzesxhK/xP1QmLnOdycs=" src="//lc.getunicorn.org?type=base-script&amp;request-id=46592"></script>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
  </div>
  <div class="calendar">
    <div class="weekdays">
      <div class="weekday">일</div><div class="weekday">월</div><div class="weekday">화</div>
      <div class="weekday">수</div><div class="weekday">목</div><div class="weekday">금</div><div class="weekday">토</div>
    </div>
    <div class="days" id="daysGrid"></div>
  </div>
  <div class="bottom">
    <button class="btn-add-top" onclick="openModal()">+ 일정 추가</button>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 id="modalTitle">📅 일정 추가</h2>
    <label>제목</label>
    <input type="text" id="evtTitle" placeholder="일정 제목 입력" />
    <label>날짜</label>
    <input type="date" id="evtDate" />
    <label>색상</label>
    <div class="color-row" id="colorRow"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['#667eea','#e74c3c','#2ecc71','#f39c12','#e91e63','#00bcd4','#9c27b0','#ff5722'];
let events = JSON.parse(localStorage.getItem('cal_events') || '[]');
let cur = new Date();
let selColor = COLORS[0];

// build color picker
const colorRow = document.getElementById('colorRow');
COLORS.forEach((c, i) => {
  const d = document.createElement('div');
  d.className = 'color-opt' + (i===0?' selected':'');
  d.style.background = c;
  d.onclick = () => {
    document.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('selected'));
    d.classList.add('selected');
    selColor = c;
  };
  colorRow.appendChild(d);
});

function save() { localStorage.setItem('cal_events', JSON.stringify(events)); }

function render() {
  const y = cur.getFullYear(), m = cur.getMonth();
  document.getElementById('monthLabel').textContent =
    `${y}년 ${m+1}월`;

  const first = new Date(y, m, 1).getDay();
  const lastDay = new Date(y, m+1, 0).getDate();
  const prevLast = new Date(y, m, 0).getDate();
  const today = new Date();

  let html = '';
  let cells = 42;

  for (let i = 0; i < cells; i++) {
    let day, cls = 'day', dateStr;
    if (i < first) {
      day = prevLast - first + 1 + i;
      const pm = m === 0 ? 12 : m;
      const py = m === 0 ? y-1 : y;
      dateStr = `${py}-${String(pm).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      cls += ' other-month';
    } else if (i >= first + lastDay) {
      day = i - first - lastDay + 1;
      const nm = m === 11 ? 1 : m+2;
      const ny = m === 11 ? y+1 : y;
      dateStr = `${ny}-${String(nm).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      cls += ' other-month';
    } else {
      day = i - first + 1;
      dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      if (day===today.getDate() && m===today.getMonth() && y===today.getFullYear())
        cls += ' today';
    }

    const dayEvts = events.filter(e => e.date === dateStr);
    const badges = dayEvts.map((e,ei) => {
      const idx = events.indexOf(e);
      return `<div class="event-badge" style="background:${e.color}" title="${e.title}">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.title}</span>
        <button class="del-btn" onclick="delEvent(event,${idx})">✕</button>
      </div>`;
    }).join('');

    html += `<div class="${cls}" onclick="openModal('${dateStr}')">
      <div class="day-num">${day}</div>
      <div class="events">${badges}</div>
    </div>`;
  }

  document.getElementById('daysGrid').innerHTML = html;
}

function changeMonth(d) { cur.setMonth(cur.getMonth()+d); render(); }

function openModal(date) {
  document.getElementById('evtTitle').value = '';
  document.getElementById('evtDate').value = date || todayStr();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('evtTitle').focus();
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target.id==='overlay') closeModal(); }

function saveEvent() {
  const title = document.getElementById('evtTitle').value.trim();
  const date = document.getElementById('evtDate').value;
  if (!title) { document.getElementById('evtTitle').focus(); return; }
  if (!date) { document.getElementById('evtDate').focus(); return; }
  events.push({ title, date, color: selColor });
  save(); render(); closeModal();
}

function delEvent(e, idx) {
  e.stopPropagation();
  events.splice(idx, 1);
  save(); render();
}

function todayStr() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('overlay').classList.contains('open')) saveEvent();
  if (e.key==='Escape') closeModal();
});

render();
</script>
</body>
</html>
