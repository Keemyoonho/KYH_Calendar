<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>윤호의 스케줄표</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }
  .app { max-width: 980px; margin: 30px auto; padding: 0 16px; }

  .header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border-radius: 16px 16px 0 0;
    padding: 20px 32px; display: flex;
    align-items: center; justify-content: space-between;
  }
  .header-title { font-size: 1.3rem; font-weight: 800; }
  .header-sub { font-size: 0.78rem; opacity: 0.75; margin-top: 2px; }
  .nav-wrap { display: flex; align-items: center; gap: 12px; }
  .nav-btn { background: rgba(255,255,255,0.2); border: none; color: white; font-size: 1.1rem; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; transition: background .2s; }
  .nav-btn:hover { background: rgba(255,255,255,0.4); }
  .month-label { font-size: 1.2rem; font-weight: 700; min-width: 130px; text-align: center; }

  .legend { background: white; padding: 10px 24px; display: flex; gap: 16px; flex-wrap: wrap; border-bottom: 1px solid #eee; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.78rem; color: #555; }
  .legend-dot { width: 11px; height: 11px; border-radius: 3px; }

  .calendar { background: white; border-radius: 0 0 16px 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
  .weekdays { display: grid; grid-template-columns: repeat(7,1fr); background: #f8f9fa; border-bottom: 1px solid #e9ecef; }
  .weekday { text-align: center; padding: 11px 0; font-size: 0.77rem; font-weight: 700; color: #6c757d; text-transform: uppercase; letter-spacing: .05em; }
  .weekday:first-child { color: #e74c3c; }
  .weekday:last-child { color: #3498db; }

  .days { display: grid; grid-template-columns: repeat(7,1fr); }
  .day { min-height: 110px; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; padding: 7px; cursor: pointer; transition: background .15s; }
  .day:hover { background: #f8f5ff; }
  .day.other-month { background: #fafafa; }
  .day.other-month .day-num { color: #ccc; }
  .day.today { background: #f0f4ff; }
  .day-num { font-size: 0.82rem; font-weight: 700; color: #333; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
  .day.today .day-num { background: linear-gradient(135deg,#667eea,#764ba2); color: white !important; }
  .day:nth-child(7n+1) .day-num { color: #e74c3c; }
  .day:nth-child(7n) .day-num { color: #3498db; }
  .events { margin-top: 3px; }
  .event-badge { font-size: 0.67rem; padding: 2px 6px; border-radius: 4px; margin-bottom: 2px; color: white; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: opacity .15s; }
  .event-badge:hover { opacity: 0.8; }

  .bottom { margin-top: 16px; display: flex; justify-content: center; }
  .btn-add { background: linear-gradient(135deg,#667eea,#764ba2); color: white; border: none; padding: 12px 32px; border-radius: 50px; font-size: 0.95rem; cursor: pointer; font-weight: 700; box-shadow: 0 4px 15px rgba(102,126,234,0.4); transition: transform .15s, box-shadow .15s; }
  .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.5); }

  /* Overlays */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }

  /* Add/Edit Modal */
  .modal { background: white; border-radius: 16px; padding: 28px; width: 420px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.25); animation: pop .2s ease; }
  @keyframes pop { from { transform: scale(0.92); opacity:0; } to { transform: scale(1); opacity:1; } }
  .modal h2 { margin-bottom: 18px; color: #333; font-size: 1.05rem; }
  .modal label { display: block; font-size: 0.82rem; color: #555; margin-bottom: 4px; margin-top: 13px; font-weight: 600; }
  .modal input, .modal select, .modal textarea {
    width: 100%; padding: 9px 12px; border: 1.5px solid #e0e0e0;
    border-radius: 8px; font-size: 0.88rem; outline: none; transition: border .2s;
    font-family: inherit;
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: #667eea; }
  .modal textarea { resize: vertical; min-height: 60px; }
  .opt-label { font-size: 0.75rem; color: #aaa; font-weight: 400; margin-left: 4px; }

  .check-row { display: flex; align-items: center; gap: 8px; margin-top: 13px; }
  .check-row input[type=checkbox] { width: auto; cursor: pointer; accent-color: #667eea; transform: scale(1.2); flex-shrink: 0; }
  .check-row label { font-size: 0.82rem; color: #555; margin: 0; cursor: pointer; font-weight: 600; }
  .toggle-section { margin-top: 10px; }

  .time-row { display: flex; gap: 10px; }
  .time-row input { flex: 1; }

  .modal-btns { display: flex; gap: 10px; margin-top: 22px; }
  .btn-save { flex:1; background: linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; padding:11px; border-radius:8px; font-size:0.9rem; cursor:pointer; font-weight:700; }
  .btn-cancel { flex:1; background:#f0f0f0; color:#555; border:none; padding:11px; border-radius:8px; font-size:0.9rem; cursor:pointer; }
  .btn-cancel:hover { background:#e0e0e0; }

  /* Detail Modal */
  .detail-modal { background: white; border-radius: 16px; width: 440px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.25); animation: pop .2s ease; overflow: hidden; }
  .detail-header { padding: 18px 22px 14px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .detail-date { font-size: 1.1rem; font-weight: 800; color: #222; }
  .detail-close { background: none; border: none; font-size: 1.3rem; color: #999; cursor: pointer; }
  .detail-close:hover { color: #333; }
  .detail-body { padding: 14px 20px 20px; overflow-y: auto; }

  /* Event Card (detail) */
  .evt-card { border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; position: relative; border-left: 4px solid transparent; }
  .evt-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .cat-badge { display: inline-flex; align-items: center; font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; color: white; }
  .evt-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .evt-action-btn { background: rgba(0,0,0,0.08); border: none; border-radius: 6px; padding: 4px 8px; font-size: 0.72rem; cursor: pointer; color: #444; transition: background .15s; }
  .evt-action-btn:hover { background: rgba(0,0,0,0.16); }
  .evt-title { font-size: 0.97rem; font-weight: 700; color: #1a1a1a; margin-bottom: 5px; }
  .evt-time { font-size: 0.78rem; color: #555; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
  .evt-deadline { font-size: 0.78rem; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 6px; font-weight: 600; }
  .evt-deadline.urgent { background: #fff3cd; color: #856404; }
  .evt-deadline.overdue { background: #fde8e8; color: #c0392b; }
  .evt-deadline.normal { background: #f0f0f0; color: #555; }
  .evt-memo { font-size: 0.8rem; color: #666; margin-top: 5px; }
  .evt-link { font-size: 0.78rem; margin-top: 6px; }
  .evt-link a { color: #667eea; text-decoration: none; display: flex; align-items: center; gap: 4px; }
  .evt-link a:hover { text-decoration: underline; }

  .detail-add-btn { width: 100%; padding: 10px; background: linear-gradient(135deg,#667eea,#764ba2); color: white; border: none; border-radius: 8px; font-size: 0.88rem; cursor: pointer; font-weight: 700; margin-top: 4px; }
  .detail-add-btn:hover { opacity: 0.9; }
  .no-event { text-align: center; color: #aaa; font-size: 0.85rem; padding: 20px 0; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
</style>

<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title">📅 윤호의 스케줄표</div>
      <div class="header-sub">Yoonho's Personal Schedule</div>
    </div>
    <div class="nav-wrap">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#4a7cf7"></div> 학교 관련</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> 시험 관련</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div> 개인 일정</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e91e9a"></div> 기념일</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div> 그 외</div>
  </div>

  <div class="calendar">
    <div class="weekdays">
      <div class="weekday">일</div><div class="weekday">월</div><div class="weekday">화</div>
      <div class="weekday">수</div><div class="weekday">목</div><div class="weekday">금</div><div class="weekday">토</div>
    </div>
    <div class="days" id="daysGrid"></div>
  </div>
  <div class="bottom">
    <button class="btn-add" onclick="openAddModal()">+ 일정 추가</button>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="addOverlay" onclick="closeAddOutside(event)">
  <div class="modal">
    <h2 id="modalTitle">📝 일정 추가</h2>
    <label>제목</label>
    <input type="text" id="evtTitle" placeholder="일정 제목 입력" />

    <label>날짜</label>
    <input type="date" id="evtDate" />

    <label>카테고리</label>
    <select id="evtCat">
      <option value="school">🏫 학교 관련</option>
      <option value="exam">📝 시험 관련</option>
      <option value="personal">🙋 개인 일정</option>
      <option value="anniv">🎉 기념일</option>
      <option value="etc">📌 그 외</option>
    </select>

    <!-- 시간 -->
    <div class="check-row">
      <input type="checkbox" id="useTime" onchange="toggleSection('timeFields',this)" />
      <label for="useTime">⏰ 시간 설정</label>
    </div>
    <div class="toggle-section" id="timeFields" style="display:none">
      <label>시작 시간</label>
      <div class="time-row">
        <input type="time" id="evtStart" />
        <input type="time" id="evtEnd" placeholder="종료" />
      </div>
    </div>

    <!-- 마감일 -->
    <div class="check-row">
      <input type="checkbox" id="useDeadline" onchange="toggleSection('deadlineFields',this)" />
      <label for="useDeadline">⚠️ 마감일 설정</label>
    </div>
    <div class="toggle-section" id="deadlineFields" style="display:none">
      <label>마감 날짜</label>
      <input type="date" id="evtDeadline" />
      <label>마감 메모 <span class="opt-label">(선택)</span></label>
      <input type="text" id="evtDeadlineMemo" placeholder="예: 활동일 포함 7일 이내 제출" />
    </div>

    <!-- 링크 -->
    <div class="check-row">
      <input type="checkbox" id="useLink" onchange="toggleSection('linkFields',this)" />
      <label for="useLink">🔗 링크 추가</label>
    </div>
    <div class="toggle-section" id="linkFields" style="display:none">
      <label>링크 URL</label>
      <input type="url" id="evtLink" placeholder="https://..." />
      <label>링크 이름 <span class="opt-label">(선택)</span></label>
      <input type="text" id="evtLinkLabel" placeholder="예: 과제 제출 페이지" />
    </div>

    <!-- 메모 -->
    <label>메모 <span class="opt-label">(선택)</span></label>
    <textarea id="evtMemo" placeholder="추가 메모"></textarea>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAddModal()">취소</button>
      <button class="btn-save" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="detailOverlay" onclick="closeDetailOutside(event)">
  <div class="detail-modal">
    <div class="detail-header">
      <div class="detail-date" id="detailDate"></div>
      <button class="detail-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<script>
const CATS = {
  school:   { label: '학교 관련', color: '#4a7cf7', bg: '#eef3ff', border: '#4a7cf7' },
  exam:     { label: '시험 관련', color: '#e74c3c', bg: '#fff0f0', border: '#e74c3c' },
  personal: { label: '개인 일정', color: '#2ecc71', bg: '#f0fff5', border: '#2ecc71' },
  anniv:    { label: '기념일',    color: '#e91e9a', bg: '#fff0f8', border: '#e91e9a' },
  etc:      { label: '그 외',    color: '#f39c12', bg: '#fffbf0', border: '#f39c12' },
};

let events = JSON.parse(localStorage.getItem('yoonho_v2') || '[]');
let cur = new Date();
let detailDate = '';
let editIdx = -1;

function save() { localStorage.setItem('yoonho_v2', JSON.stringify(events)); }

function todayStr() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}

function fmtTime(t) {
  if (!t) return '';
  const [h,m] = t.split(':');
  const hh = +h, ampm = hh >= 12 ? '오후' : '오전';
  const hd = hh===0?12:hh>12?hh-12:hh;
  return `${ampm} ${hd}:${m}`;
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${+m}월 ${+day}일`;
}

function deadlineStatus(dStr) {
  if (!dStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const dl = new Date(dStr); dl.setHours(0,0,0,0);
  const diff = Math.ceil((dl - today) / 86400000);
  if (diff < 0) return { cls: 'overdue', icon: '🚨', text: `마감 ${Math.abs(diff)}일 초과` };
  if (diff <= 3) return { cls: 'urgent', icon: '⚠️', text: diff===0 ? '오늘 마감!' : `마감 D-${diff}` };
  return { cls: 'normal', icon: '📅', text: `마감 ${fmtDate(dStr)} (D-${diff})` };
}

function toggleSection(id, cb) {
  document.getElementById(id).style.display = cb.checked ? 'block' : 'none';
}

function render() {
  const y = cur.getFullYear(), m = cur.getMonth();
  document.getElementById('monthLabel').textContent = `${y}년 ${m+1}월`;
  const first = new Date(y,m,1).getDay();
  const lastDay = new Date(y,m+1,0).getDate();
  const prevLast = new Date(y,m,0).getDate();
  const today = new Date();

  let html = '';
  for (let i = 0; i < 42; i++) {
    let day, cls = 'day', dateStr;
    if (i < first) {
      day = prevLast - first + 1 + i;
      const pm=m===0?12:m, py=m===0?y-1:y;
      dateStr = `${py}-${String(pm).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      cls += ' other-month';
    } else if (i >= first+lastDay) {
      day = i - first - lastDay + 1;
      const nm=m===11?1:m+2, ny=m===11?y+1:y;
      dateStr = `${ny}-${String(nm).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      cls += ' other-month';
    } else {
      day = i - first + 1;
      dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      if (day===today.getDate()&&m===today.getMonth()&&y===today.getFullYear()) cls+=' today';
    }
    const dayEvts = events.filter(e=>e.date===dateStr)
      .sort((a,b)=>(a.start||'99:99').localeCompare(b.start||'99:99'));
    const badges = dayEvts.map(e => {
      const cat = CATS[e.cat]||CATS.etc;
      const dl = deadlineStatus(e.deadline);
      const warn = dl && (dl.cls==='urgent'||dl.cls==='overdue') ? ' ⚠' : '';
      const t = e.start ? ` ${fmtTime(e.start)}` : '';
      return `<div class="event-badge" style="background:${cat.color}" onclick="openDetailModal(event,'${dateStr}')">${e.title}${t}${warn}</div>`;
    }).join('');
    html += `<div class="${cls}" onclick="openDetailModal(event,'${dateStr}')">
      <div class="day-num">${day}</div>
      <div class="events">${badges}</div>
    </div>`;
  }
  document.getElementById('daysGrid').innerHTML = html;
}

function changeMonth(d) { cur.setMonth(cur.getMonth()+d); render(); }

function openAddModal(date, idx) {
  editIdx = (idx !== undefined) ? idx : -1;
  const isEdit = editIdx >= 0;
  document.getElementById('modalTitle').textContent = isEdit ? '✏️ 일정 수정' : '📝 일정 추가';

  const e = isEdit ? events[editIdx] : {};
  document.getElementById('evtTitle').value = e.title || '';
  document.getElementById('evtDate').value = e.date || date || todayStr();
  document.getElementById('evtCat').value = e.cat || 'school';
  document.getElementById('evtMemo').value = e.memo || '';

  const ut = !!(e.start);
  document.getElementById('useTime').checked = ut;
  document.getElementById('timeFields').style.display = ut ? 'block' : 'none';
  document.getElementById('evtStart').value = e.start || '';
  document.getElementById('evtEnd').value = e.end || '';

  const ud = !!(e.deadline);
  document.getElementById('useDeadline').checked = ud;
  document.getElementById('deadlineFields').style.display = ud ? 'block' : 'none';
  document.getElementById('evtDeadline').value = e.deadline || '';
  document.getElementById('evtDeadlineMemo').value = e.deadlineMemo || '';

  const ul = !!(e.link);
  document.getElementById('useLink').checked = ul;
  document.getElementById('linkFields').style.display = ul ? 'block' : 'none';
  document.getElementById('evtLink').value = e.link || '';
  document.getElementById('evtLinkLabel').value = e.linkLabel || '';

  document.getElementById('addOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('evtTitle').focus(), 100);
}
function closeAddModal() { document.getElementById('addOverlay').classList.remove('open'); editIdx=-1; }
function closeAddOutside(e) { if(e.target.id==='addOverlay') closeAddModal(); }

function saveEvent() {
  const title = document.getElementById('evtTitle').value.trim();
  const date  = document.getElementById('evtDate').value;
  const cat   = document.getElementById('evtCat').value;
  const memo  = document.getElementById('evtMemo').value.trim();
  const useTime = document.getElementById('useTime').checked;
  const start = useTime ? document.getElementById('evtStart').value : '';
  const end   = useTime ? document.getElementById('evtEnd').value : '';
  const useDL = document.getElementById('useDeadline').checked;
  const deadline = useDL ? document.getElementById('evtDeadline').value : '';
  const deadlineMemo = useDL ? document.getElementById('evtDeadlineMemo').value.trim() : '';
  const useLink = document.getElementById('useLink').checked;
  const link = useLink ? document.getElementById('evtLink').value.trim() : '';
  const linkLabel = useLink ? document.getElementById('evtLinkLabel').value.trim() : '';

  if (!title) { document.getElementById('evtTitle').focus(); return; }
  if (!date)  { document.getElementById('evtDate').focus(); return; }

  const obj = { title, date, cat, memo, start, end, deadline, deadlineMemo, link, linkLabel };
  if (editIdx >= 0) events[editIdx] = obj;
  else events.push(obj);

  save(); render(); closeAddModal();
  if (detailDate === date) renderDetail(date);
  else if (editIdx >= 0) renderDetail(obj.date);
}

function openDetailModal(e, dateStr) {
  e.stopPropagation();
  detailDate = dateStr;
  const parts = dateStr.split('-');
  const d = new Date(+parts[0],+parts[1]-1,+parts[2]);
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('detailDate').textContent =
    `${+parts[1]}월 ${+parts[2]}일 (${days[d.getDay()]})`;
  renderDetail(dateStr);
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetailModal() { document.getElementById('detailOverlay').classList.remove('open'); detailDate=''; }
function closeDetailOutside(e) { if(e.target.id==='detailOverlay') closeDetailModal(); }

function renderDetail(dateStr) {
  const dayEvts = events.map((e,i)=>({...e,_i:i})).filter(e=>e.date===dateStr)
    .sort((a,b)=>(a.start||'99:99').localeCompare(b.start||'99:99'));

  let html = '';
  if (!dayEvts.length) html = '<div class="no-event">등록된 일정이 없어요</div>';

  dayEvts.forEach(e => {
    const cat = CATS[e.cat]||CATS.etc;
    const dl = deadlineStatus(e.deadline);

    let timeHtml = '';
    if (e.start) {
      timeHtml = `<div class="evt-time">⏰ ${fmtTime(e.start)}`;
      if (e.end) timeHtml += ` ~ ${fmtTime(e.end)}`;
      timeHtml += `</div>`;
    }

    let dlHtml = '';
    if (dl) {
      const memo = e.deadlineMemo ? ` — ${e.deadlineMemo}` : '';
      dlHtml = `<div class="evt-deadline ${dl.cls}">${dl.icon} ${dl.text}${memo}</div>`;
    }

    let linkHtml = '';
    if (e.link) {
      const label = e.linkLabel || e.link;
      linkHtml = `<div class="evt-link">🔗 <a href="${e.link}" target="_blank" rel="noopener">${label}</a></div>`;
    }

    let memoHtml = e.memo ? `<div class="evt-memo">📌 ${e.memo}</div>` : '';

    html += `<div class="evt-card" style="background:${cat.bg}; border-left-color:${cat.border}">
      <div class="evt-card-top">
        <span class="cat-badge" style="background:${cat.color}">${cat.label}</span>
        <div class="evt-actions">
          <button class="evt-action-btn" onclick="editEvent(${e._i},'${dateStr}')">✏️ 수정</button>
          <button class="evt-action-btn" onclick="delEvent(${e._i},'${dateStr}')">🗑 삭제</button>
        </div>
      </div>
      <div class="evt-title">${e.title}</div>
      ${timeHtml}${dlHtml}${memoHtml}${linkHtml}
    </div>`;
  });

  html += `<button class="detail-add-btn" onclick="openAddFromDetail('${dateStr}')">+ 이 날 일정 추가</button>`;
  document.getElementById('detailBody').innerHTML = html;
}

function editEvent(idx, dateStr) {
  closeDetailModal();
  openAddModal(dateStr, idx);
}

function delEvent(idx, dateStr) {
  if (!confirm('삭제할까요?')) return;
  events.splice(idx,1);
  save(); render(); renderDetail(dateStr);
}

function openAddFromDetail(dateStr) {
  closeDetailModal();
  openAddModal(dateStr);
}

document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeAddModal(); closeDetailModal(); }
});

render();
</script>
</body>
</html>
